<div class="me-dettaglio-container">
  <app-header
    [title]="'ME.PLAYER_TITLE' | translate"
    visHome="S"
    visLogout="N"
    (back)="goBack()"
    (logout)="logout()"
  ></app-header>

  <main class="main-content">
    <div class="lega-dettaglio-container">
      <mat-card class="lega-card">
        <mat-card-header>
          <!--
          <mat-card-title>Nome: -</mat-card-title>
          <mat-card-subtitle>--</mat-card-subtitle>
            -->
          <form class="me-form" (ngSubmit)="confermaNome()">
            <mat-form-field class="me-full-width">
              <mat-label>{{ 'ME.NAME_LABEL' | translate }}</mat-label>
              <input
                matInput
                [(ngModel)]="nickname"
                [ngModelOptions]="{ standalone: true }"
                (input)="clearFeedback()"
              />
            </mat-form-field>

            <div class="me-actions">
              <button
                mat-raised-button
                class="btn-conferma"
                type="button"
                [disabled]="!nomeModificato || isSaving"
                (click)="confermaNome()"
              >
                {{ isSaving ? ('ME.SAVING' | translate) : ('ME.CONFIRM_BTN' | translate) }}
              </button>

          @if (feedbackMessage ) {
              <div
                class="feedback-badge"
                [class.success]="feedbackType === 'success'"
                [class.error]="feedbackType === 'error'"
              >
                <mat-icon>{{ feedbackType === 'success' ? 'check_circle' : 'error' }}</mat-icon>
                <span>{{ feedbackMessage }}</span>
              </div>
            }
            </div>
          </form>
        </mat-card-header>
      </mat-card>
    </div>
  </main>
</div>

@if (showEasterEgg) {
  <div class="easter-overlay"
       [class.lit]="easterLit"
       [class.extinguished]="easterExtinguished"
       (mousemove)="handleEasterMove($event)"
       (touchmove)="handleEasterMove($event)"
       (click)="handleEasterClick()">
    <p class="easter-instruction" [style.opacity]="easterInstructionOpacity">{{ easterInstructionText }}</p>
    <div class="easter-scene">
      <div class="easter-match" [style.transform]="matchTransform">
        <div class="easter-smoke-container">
          <div class="easter-smoke easter-smoke-1"></div>
          <div class="easter-smoke easter-smoke-2"></div>
          <div class="easter-smoke easter-smoke-3"></div>
        </div>
        <div class="easter-flame-container">
          <div class="easter-flame"></div>
          <div class="easter-sparkles"></div>
        </div>
        <div class="easter-match-head"></div>
        <div class="easter-match-stick"></div>
      </div>
    </div>
    <button class="easter-close" (click)="onCloseEaster($event)">✕</button>
  </div>
}
